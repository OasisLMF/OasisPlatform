name: Python Tests - Worker Controller

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - stable**  
  workflow_dispatch:
    inputs:
      oasislmf_branch:
        description: 'If set, pip install oasislmf branch [git ref]'
        required: false
      ods_branch:
        description: 'If set, pip install ods-tools branch [git ref]'
        required: false
  workflow_call:
    inputs:
      oasislmf_branch:
        description: 'If set, pip install oasislmf branch [git ref]'
        required: false
        type: string
      ods_branch:
        description: 'If set, pip install ods-tools branch [git ref]'
        required: false
        type: string

jobs:
  unittest:
    env:
      JUNIT_REPORT: pytest_worker-controller_report.xml
      PLAT_BRANCH: ${{ github.ref }}
    runs-on: ubuntu-22.04

    steps:
    - name: Branch selection (remote trigger)
      if: inputs.platform_branch != ''
      run: echo "PLAT_BRANCH=${{ inputs.platform_branch }}" >> $GITHUB_ENV

    - name: Checkout
      uses: actions/checkout@v3
      with:
        repository: OasisLMF/OasisPlatform
        ref: ${{ env.PLAT_BRANCH }}

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: |
        pip install pytest
        pip install -r kubernetes/worker-controller/requirements.txt

    - name: Install ods-tools from branch
      if: inputs.ods_branch != ''
      run: pip install -v "git+https://git@github.com/OasisLMF/ODS_Tools.git@${{ inputs.ods_branch }}#egg=ods-tools"

    - name: Install oasislmf from branch
      if: inputs.oasislmf_branch != ''
      run: pip install -v "git+https://git@github.com/OasisLMF/OasisLMF.git@${{ inputs.oasislmf_branch }}#egg=oasislmf"

    - name: Run Pytest
      run: |
        cd kubernetes/worker-controller/src
        python -m pytest -v

