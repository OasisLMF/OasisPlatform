# Workflow to create (or update) a release PR
#
# Inputs:
#   release_version:   The semvar platform version, e.g. 2.3.1 or 2.3.1rc1
#   stable_branch:     The target branch for the PR, e.g. stable/2.x
#   oasislmf_version:  (optional) Pin oasislmf to this version via pip-compile
#   ods_tools_version: (optional) Pin ods-tools to this version via pip-compile
#   odm_version:       (optional) Pin oasis-data-manager to this version via pip-compile
#
# Actions:
#   0. If the triggering branch is not release/*, create release/<release_version>
#      branching from the current branch and continue on that
#   1. Updates VERSION and optionally re-pins packages (mirrors version.yml logic)
#      on the working branch and pushes a commit
#   2. Scans git history since the most recent tag and extracts merged PR numbers
#   3. Creates a PR from the release branch to stable_branch titled "Release <version>"
#      If a PR already exists for this head→base pair, updates its body instead

name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version [semvar]'
        required: true
      stable_branch:
        description: 'Target stable branch (e.g. stable/2.x)'
        required: true
      oasislmf_version:
        description: 'Pin oasislmf to version [semvar] (optional)'
        required: false
        default: ''
      ods_tools_version:
        description: 'Pin ods-tools to version [semvar] (optional)'
        required: false
        default: ''
      odm_version:
        description: 'Pin oasis-data-manager to version [semvar] (optional)'
        required: false
        default: ''


jobs:
  # ── Job 1 ──────────────────────────────────────────────────────────────────
  # Determine (and optionally create) the release branch to work on.
  # Outputs the branch name used by all subsequent jobs.
  setup:
    runs-on: ubuntu-latest
    outputs:
      working_branch: ${{ steps.branch.outputs.working_branch }}

    steps:
      - name: Resolve working branch
        id: branch
        run: |
          if [[ "${{ github.ref_name }}" == release/* ]]; then
            echo "Already on a release branch: ${{ github.ref_name }}"
            echo "working_branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            NEW_BRANCH="release/${{ inputs.release_version }}"
            echo "Not on a release branch — will create: $NEW_BRANCH"
            echo "working_branch=${NEW_BRANCH}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout (only needed when creating a new branch)
        if: ${{ !startsWith(github.ref_name, 'release/') }}
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Create and push release branch
        if: ${{ !startsWith(github.ref_name, 'release/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.BUILD_GIT_TOKEN }}
        run: |
          git checkout -b release/${{ inputs.release_version }}
          git push origin release/${{ inputs.release_version }}


  # ── Job 2 ──────────────────────────────────────────────────────────────────
  # Update VERSION and optionally re-pin packages on the working branch.
  # Mirrors the logic in version.yml but targets the working_branch ref.
  update-version:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Check valid semvar
        run: |
          VALID=$(echo "${{ inputs.release_version }}" | grep -oPc "^(\d+)\.(\d+)\.(\d+)rc(\d+)|(\d+)\.(\d+)\.(\d+)$")
          [[ "$VALID" -eq "1" ]] || { echo "Invalid semvar: ${{ inputs.release_version }}"; exit 1; }

      - name: Checkout working branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ needs.setup.outputs.working_branch }}

      - name: Setup git user
        run: |
          git config --global user.email "${{ secrets.BUILD_GIT_EMAIL }}"
          git config --global user.name "${{ secrets.BUILD_GIT_USERNAME }}"
          git config --global pull.ff only

      - name: Update Platform Version
        run: |
          echo ${{ inputs.release_version }} > VERSION
          git add VERSION

      - name: Set up Python 3.12
        if: inputs.oasislmf_version != '' || inputs.ods_tools_version != '' || inputs.odm_version != ''
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install pip-tools
        if: inputs.oasislmf_version != '' || inputs.ods_tools_version != '' || inputs.odm_version != ''
        run: |
          python -m pip install --upgrade "pip<23.3"
          pip install pip-tools

      - name: Update oasislmf version
        if: inputs.oasislmf_version != ''
        run: |
          requ_list=( 'requirements-server' 'requirements-worker' 'requirements')
          for fl in "${requ_list[@]}"; do
            pip-compile --upgrade-package oasislmf==${{ inputs.oasislmf_version }} $fl.in
            git add $fl.txt
          done

      - name: Update ods-tools version
        if: inputs.ods_tools_version != ''
        run: |
          requ_list=( 'requirements-server' 'requirements-worker' 'requirements')
          for fl in "${requ_list[@]}"; do
            pip-compile --upgrade-package ods-tools==${{ inputs.ods_tools_version }} $fl.in
            git add $fl.txt
          done

      - name: Update oasis-data-manager version
        if: inputs.odm_version != ''
        run: |
          requ_list=( 'requirements-server' 'requirements-worker' 'requirements')
          for fl in "${requ_list[@]}"; do
            pip-compile --upgrade-package oasis-data-manager==${{ inputs.odm_version }} $fl.in
            git add $fl.txt
          done

      - name: Git commit
        run: |
          [[ -z $(git status -s) ]] || git commit -m "Set version ${{ inputs.release_version }}"

      - name: Push
        run: git push
        env:
          GITHUB_TOKEN: ${{ secrets.BUILD_GIT_TOKEN }}


  # ── Job 3 ──────────────────────────────────────────────────────────────────
  # Build the PR body from merged PRs since the last tag, then create or update
  # the release PR targeting stable_branch.
  create-release-pr:
    runs-on: ubuntu-latest
    needs: [setup, update-version]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout working branch
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ needs.setup.outputs.working_branch }}

      - name: Pull latest (pick up version bump commit)
        run: git pull

      - name: Build PR body
        run: |
          # Find the most recent tag reachable from HEAD
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [[ -z "$LATEST_TAG" ]]; then
            echo "No tags found — scanning full history"
            LOG_RANGE="HEAD"
          else
            echo "Scanning commits since tag: $LATEST_TAG"
            LOG_RANGE="${LATEST_TAG}..HEAD"
          fi

          # Extract PR numbers from commit subjects e.g. "fix foo (#1830)" -> "* #1830"
          # Deduplicate while preserving most-recent-first order
          PR_LINES=$(git log --pretty=format:"%s" $LOG_RANGE \
            | grep -oP '\(#\d+\)' \
            | grep -oP '\d+' \
            | awk '!seen[$0]++' \
            | sed 's/^/* #/')

          if [[ -z "$PR_LINES" ]]; then
            PR_LINES="* No PRs found since last tag"
          fi

          # Write body to a file to avoid shell-quoting issues with multiline strings
          {
            echo "### Release ${{ inputs.release_version }}"
            echo ""
            echo "$PR_LINES"
          } > /tmp/pr_body.md

          echo "--- PR body ---"
          cat /tmp/pr_body.md

      - name: Check for existing PR
        id: check_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --head "${{ needs.setup.outputs.working_branch }}" \
            --base "${{ inputs.stable_branch }}" \
            --json number \
            --jq '.[0].number // empty')
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          if [[ -n "$PR_NUMBER" ]]; then
            echo "Found existing PR #${PR_NUMBER}"
          else
            echo "No existing PR found"
          fi

      - name: Create PR
        if: steps.check_pr.outputs.pr_number == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Release ${{ inputs.release_version }}" \
            --body-file /tmp/pr_body.md \
            --base "${{ inputs.stable_branch }}" \
            --head "${{ needs.setup.outputs.working_branch }}"

      - name: Update existing PR body
        if: steps.check_pr.outputs.pr_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ steps.check_pr.outputs.pr_number }}" \
            --body-file /tmp/pr_body.md
          echo "Updated PR #${{ steps.check_pr.outputs.pr_number }}"
