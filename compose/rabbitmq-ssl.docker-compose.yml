version: '3.4'
volumes:
  server-db-OasisData:
  celery-db-OasisData:
  filestore-OasisData:
x-shared-env: &shared-env
  OASIS_DEBUG: 1
  OASIS_DEBUG_TOOLBAR: 1
  OASIS_KEEP_RUN_DIR: 1
  OASIS_KEEP_LOCAL_DATA: 1
  OASIS_KEEP_REMOTE_DATA: 1
  OASIS_URL_SUB_PATH: 0
  OASIS_CELERY_BROKER_URL: "amqps://rabbit:rabbit@broker:5671"
  OASIS_CELERY_BROKER_SSL_CA_CERTS: "/ssl/ca_certificate.pem"
  #OASIS_CELERY_BROKER_SSL_CERTFILE: ""   # leave blank for server-only auth
  #OASIS_CELERY_BROKER_SSL_KEYFILE: ""
  OASIS_SERVER_DB_HOST: server-db
  OASIS_SERVER_DB_PASS: oasis
  OASIS_SERVER_DB_USER: oasis
  OASIS_SERVER_DB_NAME: oasis
  OASIS_SERVER_DB_PORT: 5432
  OASIS_SERVER_CHANNEL_LAYER_HOST: channel-layer
  OASIS_SERVER_DB_ENGINE: django.db.backends.postgresql
  OASIS_CELERY_DB_ENGINE: db+postgresql+psycopg
  OASIS_CELERY_DB_HOST: celery-db
  OASIS_CELERY_DB_PASS: password
  OASIS_CELERY_DB_USER: celery
  OASIS_CELERY_DB_NAME: celery
  OASIS_CELERY_DB_PORT: 5432
  OASIS_CELERY_BROKER_MANAGEMENT_PORT: 15671
  OASIS_TASK_CONTROLLER_QUEUE: task-controller
  OASIS_WEBSOCKET_PORT: 8001
  OASIS_WEBSOCKET_URL: ws://server-websocket

x-oasis-env-v1: &oasis-env-v1
  OASIS_DEBUG: ${DEBUG:-0}
  OASIS_RABBIT_HOST: broker
  OASIS_RABBIT_PORT: 5671
  OASIS_RABBIT_USER: rabbit
  OASIS_RABBIT_PASS: rabbit
  OASIS_CELERY_DB_ENGINE: db+postgresql+psycopg
  OASIS_CELERY_DB_HOST: celery-db
  OASIS_CELERY_DB_PASS: password
  OASIS_CELERY_DB_USER: celery
  OASIS_CELERY_DB_NAME: celery
  OASIS_CELERY_DB_PORT: 5432

services:
  server:
   restart: always
   image: coreoasis/api_server:dev
   command: ["./wsgi/run-wsgi.sh"]
   build:
     context: .
     dockerfile: Dockerfile.api_server
   ports:
     - 8000:8000
     - 51970:51970
   links:
     - server-db
     - celery-db
     - broker
   environment:
     <<: *shared-env
     STARTUP_RUN_MIGRATIONS: "true"
     OASIS_USE_OIDC: ""
     OASIS_SERVICE_USERNAME_OR_ID: admin
     OASIS_SERVICE_PASSWORD_OR_SECRET: password
   volumes:
     - filestore-OasisData:/shared-fs:rw
     - ../src/server/oasisapi:/var/www/oasis/src/server/oasisapi
     - ./rabbitmq-ssl/certs:/ssl:ro
  server-websocket:
   restart: always
   image: coreoasis/api_server:dev
   command: ["./asgi/run-asgi.sh"]
   links:
     - server-db
     - celery-db
     - broker
   ports:
     - 8001:8001
   environment:
     <<: *shared-env
   volumes:
     - filestore-OasisData:/shared-fs:rw
     - ../src/server/oasisapi:/var/www/oasis/src/server/oasisapi
     - ./rabbitmq-ssl/certs:/ssl:ro
  v1-worker-monitor:
   restart: always
   image: coreoasis/api_server:dev
   command: [celery, -A, 'src.server.oasisapi.celery_app_v1', worker, --loglevel=DEBUG,]
   links:
     - server-db
     - celery-db
     - broker
   environment:
     <<: *shared-env
   volumes:
     - filestore-OasisData:/shared-fs:rw
     - ../src/server/oasisapi:/var/www/oasis/src/server/oasisapi
     - ./rabbitmq-ssl/certs:/ssl:ro
  v2-worker-monitor:
   restart: always
   image: coreoasis/api_server:dev
   command: [celery, -A, 'src.server.oasisapi.celery_app_v2', worker, --loglevel=DEBUG,  -Q, celery-v2]
   links:
     - server-db
     - celery-db
     - broker
   environment:
     <<: *shared-env
   volumes:
     - filestore-OasisData:/shared-fs:rw
     - ../src/server/oasisapi:/var/www/oasis/src/server/oasisapi
     - ./rabbitmq-ssl/certs:/ssl:ro
  v2-task-controller:
   restart: always
   image: coreoasis/api_server:dev
   command: [celery, -A, 'src.server.oasisapi.celery_app_v2', worker, --loglevel=DEBUG, -Q, task-controller]
   links:
     - server-db
     - celery-db
     - broker
   environment:
     <<: *shared-env
   volumes:
     - filestore-OasisData:/shared-fs:rw
     - ../src/server/oasisapi/analyses:/var/www/oasis/src/server/oasisapi/analyses
     - ./rabbitmq-ssl/certs:/ssl:ro
  celery-beat_v2:
   restart: always
   image: coreoasis/api_server:dev
   command: [celery, -A, src.server.oasisapi.celery_app_v2, beat, --loglevel=DEBUG]
   links:
     - server-db
     - celery-db
     - broker
   environment:
     <<: *shared-env
   volumes:
     - filestore-OasisData:/shared-fs:rw
     - ./rabbitmq-ssl/certs:/ssl:ro
  v1-worker:
    restart: always
    image: coreoasis/model_worker:dev
    build:
      context: .
      dockerfile: Dockerfile.model_worker
    links:
     - celery-db
     - broker:mybroker
    environment:
     <<: *shared-env
     OASIS_MODEL_SUPPLIER_ID: OasisLMF
     OASIS_MODEL_ID: PiWind
     OASIS_MODEL_VERSION_ID: 'v1'
     OASIS_RUN_MODE: v1
    volumes:
     - ${OASIS_MODEL_DATA_DIR:-./data/static}:/home/worker/model:rw
     - ../src/model_execution_worker:/home/worker/src/model_execution_worker
     - filestore-OasisData:/shared-fs:rw
     - ./rabbitmq-ssl/certs:/ssl:ro
  v2-worker:
    restart: always
    image: coreoasis/model_worker:dev
    build:
      context: .
      dockerfile: Dockerfile.model_worker
    links:
     - celery-db
     - broker:mybroker
    environment:
     <<: *shared-env
     OASIS_MODEL_SUPPLIER_ID: OasisLMF
     OASIS_MODEL_ID: PiWind
     OASIS_MODEL_VERSION_ID: 'v2'
     OASIS_RUN_MODE: v2
    volumes:
     - ${OASIS_MODEL_DATA_DIR:-./data/static}:/home/worker/model:rw
     - ../src/model_execution_worker:/home/worker/src/model_execution_worker
     - filestore-OasisData:/shared-fs:rw
     - ./rabbitmq-ssl/certs:/ssl:ro
  internal-worker:
    restart: always
    image: coreoasis/model_worker:dev
    build:
      context: .
      dockerfile: Dockerfile.model_worker
    links:
     - celery-db
     - broker:mybroker
    environment:
     <<: *shared-env
     OASIS_RUN_MODE: server-internal
    volumes:
     - ${OASIS_MODEL_DATA_DIR:-./data/static}:/home/worker/model:rw
     - ../src/model_execution_worker:/home/worker/src/model_execution_worker
     - filestore-OasisData:/shared-fs:rw
     - ./rabbitmq-ssl/certs:/ssl:ro
  server-db:
    restart: always
    image: postgres
    environment:
      - POSTGRES_DB=oasis
      - POSTGRES_USER=oasis
      - POSTGRES_PASSWORD=oasis
    volumes:
      - server-db-OasisData:/var/lib/postgresql:rw
    ports:
      - 33307:5432
  celery-db:
    restart: always
    image: postgres
    environment:
      - POSTGRES_DB=celery
      - POSTGRES_USER=celery
      - POSTGRES_PASSWORD=password
    volumes:
      - celery-db-OasisData:/var/lib/postgresql:rw
    ports:
      - 33306:5432
  broker:
    restart: always
    image: rabbitmq:3.8.14-management
    volumes:
      - ./rabbitmq-ssl/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq-ssl/certs:/etc/rabbitmq/ssl:ro
    ports:
      - 5671:5671
      - 15671:15671
  channel-layer:
    restart: always
    image: redis:5.0.7
    ports:
      - 6379:6379
  user-interface:
    restart: always
    image: coreoasis/oasisui_app:${VERS_UI:-latest}
    container_name: oasisui_app
    environment:
     - API_IP=server:8000/
     - API_VERSION=v2
     - API_SHARE_FILEPATH=./downloads
     - OASIS_ENVIRONMENT=oasis_localhost
    ports:
     - 8080:3838
  portainer:
   restart: always
   image: portainer/portainer:latest
   ports:
     - 8002:8002
     - 9000:9000
   volumes:
     - /var/run/docker.sock:/var/run/docker.sock
     - ./portainer_data:/data portainer/portainer
