# RabbitMQ SSL configuration for AMQPS support (development use only)
# Plain AMQP is disabled; only AMQPS on port 5671 is exposed.
# Credentials are defined here so the Docker entrypoint does not need to
# modify this file (which would fail when it is mounted read-only).
default_user = rabbit
default_pass = rabbit

listeners.tcp = none
listeners.ssl.default = 5671

ssl_options.cacertfile = /etc/rabbitmq/ssl/ca_certificate.pem
ssl_options.certfile   = /etc/rabbitmq/ssl/server_certificate.pem
ssl_options.keyfile    = /etc/rabbitmq/ssl/server_key.pem
ssl_options.verify     = verify_none
ssl_options.fail_if_no_peer_cert = false

management.listener.port = 15671
management.listener.ssl  = false
